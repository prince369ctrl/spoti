name: Build & Pre-Release Debug APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0-beta1)'
        required: true
        default: '1.0.0-dev'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ──────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK ───────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Bootstrap Gradle wrapper jar ─────────────────────────────────────────
      - name: Bootstrap Gradle wrapper jar
        working-directory: android-tictactoe
        run: |
          GRADLE_VERSION="8.7"
          mkdir -p gradle/wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar for Gradle $GRADLE_VERSION..."
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            echo "Downloaded: $(du -h gradle/wrapper/gradle-wrapper.jar)"
          fi
          chmod +x gradlew

      # ── Gradle cache ──────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android-tictactoe/**/*.gradle.kts', 'android-tictactoe/gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── Determine version ─────────────────────────────────────────────────────
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version_name }}"
          fi
          BUILD_NUM=${{ github.run_number }}
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Build: $BUILD_NUM"

      # ── Patch versionCode + versionName ──────────────────────────────────────
      - name: Patch version
        working-directory: android-tictactoe
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_NUM="${{ steps.version.outputs.build_num }}"
          sed -i "s/versionCode = 1/versionCode = ${BUILD_NUM}/" app/build.gradle.kts
          sed -i "s/versionName = \"1.0.0\"/versionName = \"${VERSION}\"/" app/build.gradle.kts
          echo "Patched: versionCode=$BUILD_NUM  versionName=$VERSION"

      # ── Build DEBUG APK ───────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android-tictactoe
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2560m -Xms512m"

      # ── Rename APK ────────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          APK=$(find android-tictactoe/app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK" "release-artifacts/AdvancedTicTacToe-v${VERSION}-debug.apk"
          echo "APK ready: $(ls -lh release-artifacts/)"

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdvancedTicTacToe-v${{ steps.version.outputs.version }}-debug
          path: release-artifacts/AdvancedTicTacToe-v${{ steps.version.outputs.version }}-debug.apk
          retention-days: 30

      # ── Create GitHub Pre-Release ─────────────────────────────────────────────
      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name != '' && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: "🎮 Advanced Tic-Tac-Toe v${{ steps.version.outputs.version }} — Debug Pre-Release"
          prerelease: true
          draft: false
          generate_release_notes: true
          files: release-artifacts/AdvancedTicTacToe-v${{ steps.version.outputs.version }}-debug.apk
          body: |
            ## 🎮 Advanced Tic-Tac-Toe — v${{ steps.version.outputs.version }} (Debug)

            ### 📲 Install
            1. Download `AdvancedTicTacToe-v${{ steps.version.outputs.version }}-debug.apk` below
            2. On your device: **Settings → Security → Install unknown apps** → Enable
            3. Open the APK → Install → Play!

            ### ✨ Features
            - Glassmorphism + Neon 3D UI · Particle effects
            - 5 AI levels (Easy → Impossible, Minimax + Alpha-Beta)
            - Board sizes: 3×3 · 4×4 · 5×5 · 6×6
            - Modes: vs AI · Local 2P · Online · Tournament
            - 50+ Achievements · 8 Themes · Bronze → Legend ranks
            - Undo · Hint · Daily rewards · Onboarding tutorial

            ### 📋 Requirements
            - Android **8.0+** (API 26)

            ---
            **Build:** #${{ github.run_number }} | **Commit:** `${{ github.sha }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
